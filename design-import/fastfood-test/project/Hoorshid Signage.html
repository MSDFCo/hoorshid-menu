<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>هورشید — تیزر منو</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;800;900&family=Lalezar&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'DigiNozha';
    src: url('assets/DigiNozha.ttf') format('truetype');
    font-weight: 400 800;
    font-display: swap;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  #root, #video-root { position: fixed; inset: 0; }
  body { font-family: 'Vazirmatn', sans-serif; -webkit-font-smoothing: antialiased; }
  img { -webkit-user-drag: none; user-select: none; }

  @keyframes emberRise {
    0%   { transform: translateY(0) translateX(0) scale(0.7); opacity: 0; }
    10%  { opacity: 0.95; }
    78%  { opacity: 0.65; }
    100% { transform: translateY(-1120px) translateX(var(--drift, 0px)) scale(1.15); opacity: 0; }
  }

  @media print { .ui-chrome { display: none !important; } }
</style>
</head>
<body>
  <div id="video-root" data-screen-label="t=0.0s">
    <div id="root"></div>
  </div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#1a130c"/>
      <circle cx="50" cy="52" r="22" fill="none" stroke="#f0a83a" stroke-width="3"/>
      <path d="M38 40 Q50 30 62 40" stroke="#ffd98a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="50" cy="52" r="9" fill="#e8780a"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="fx.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="scenes.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
